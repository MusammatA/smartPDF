<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>smartPDF</title>
    <link rel="stylesheet" href="styles.css?v=6">
  </head>
  <body>
    <div class="app-shell">
      <div class="app-layout">
        <aside class="source-sidebar">
          <div id="source-tabs" class="source-tabs" aria-label="Source format filters"></div>
        </aside>

        <div class="catalog-panel">
          <div class="search-wrap">
            <input
              id="search-input"
              type="search"
              placeholder="Search outputs"
              autocomplete="off"
            >
          </div>

          <div id="conversion-grid" class="browse-shell target-grid"></div>
        </div>
      </div>
      <div id="toast" class="toast" aria-live="polite"></div>
    </div>

    <script src="app.js?v=9" defer></script>
  </body>
</html>
